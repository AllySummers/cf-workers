[tasks.dev]
description = "Start local dev server for spotify-checker"
run = "wrangler dev"
dir = "workers/spotify-checker"

[tasks.deploy]
description = "Deploy spotify-checker to Cloudflare"
run = "wrangler deploy"
dir = "workers/spotify-checker"

[tasks.types]
description = "Generate Worker env and runtime types"
run = "wrangler types"
dir = "workers/spotify-checker"
