name = "spotify-new-releases"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[[routes]]
pattern = "spotify-releases.ay.ms"
custom_domain = true

[[kv_namespaces]]
binding = "POSTED_ALBUMS"
id = "c6c5af4b009d4321adee42533e89328f"

[secrets]
required = [
	"SPOTIFY_CLIENT_ID",
	"SPOTIFY_CLIENT_SECRET",
	"DISCORD_CLIENT_ID",
	"DISCORD_CLIENT_SECRET",
	"DISCORD_WEBHOOK_URL",
	"TRIGGER_SECRET",
	"LINK_SECRET",
]

[triggers]
# 13:01 and 14:01 UTC — one hits midnight Sydney year-round (AEDT vs AEST).
crons = ["1 13 * * *", "1 14 * * *"]

[observability]
enabled = true
traces.enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1

